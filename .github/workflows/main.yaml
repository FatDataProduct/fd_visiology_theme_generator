name: Main Branch CI/CD
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  GHCR_ACTOR: fatdataproduct
  REPOSITORY: fd_visiology_theme_generator
  IMAGE_NAME: fd_visiology_theme_generator-main
  NAMESPACE: front

jobs:
  # Сборка и пуш Docker образа
  build-and-push:
    runs-on: Linux
    steps:
      - name: Pre-cleanup workspace
        run: |
          echo "=== Cleaning workspace before checkout ==="
          docker run --rm \
            -v $PWD:/workspace \
            alpine:latest \
            sh -c "cd /workspace && rm -rf * .[!.]* 2>/dev/null || true"
          sudo rm -rf $PWD/* $PWD/.[!.]* 2>/dev/null || true
          echo "=== Workspace cleaned ==="

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_ACTOR }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Деплой в Kubernetes
  deploy:
    needs: build-and-push
    runs-on: deploy
    steps:
      - name: Deploy to Kubernetes
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "🚀 Deploying fd_visiology_theme_generator-main..."
          ssh-agent bash -c "
            ssh-add - <<< \"$SSH_KEY\"
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
              'kubectl rollout restart deployment/fd_visiology_theme_generator-main -n ${{ env.NAMESPACE }} && \
               kubectl rollout status deployment/fd_visiology_theme_generator-main -n ${{ env.NAMESPACE }} --timeout=300s'
          "
          echo "✅ Deployment completed successfully"

      - name: Deployment complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 VTB main deployment updated!"
          echo "  ✅ fd_visiology_theme_generator-main"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"